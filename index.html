<!-- REGISTRO -->
<div id="registro" style="display:none;">
    <h1>Registrar Documento</h1>

    <form action="/Sistema_Registro/guardar.php" method="POST" id="formRegistro">

        <input type="text" name="codigo" placeholder="DOC001" required>
        <input type="text" name="tipo" placeholder="Tipo" required>
        <input type="date" name="fecha" required>
        <input type="text" name="remitente" placeholder="Remitente" required>

        <select name="despacho" required>
            <option value="">Seleccione</option>
            <option value="1">Fiscalía 1</option>
            <option value="2">Fiscalía 2</option>
            <option value="3">Administración</option>
            <option value="4">Logística</option>
        </select>

        <button type="submit">Registrar</button>
    </form>
</div>

<!-- LISTA -->

    <table>

        <tbody id="tabla"></tbody>
