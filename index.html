<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Documentos</title>
<link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<div class="sidebar">
    <h2>📂 Sistema</h2>
    <a href="#" onclick="mostrar('dashboard')">📊 Dashboard</a>
    <a href="#" onclick="mostrar('registro')">📝 Registrar</a>
    <a href="#" onclick="mostrar('lista')">📋 Lista</a>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
    <h1>Dashboard</h1>

    <div class="cards">
        <div class="card"><h3>Total</h3><p id="totalDocs">0</p></div>
        <div class="card"><h3>Pendientes</h3><p id="pendientes">0</p></div>
        <div class="card"><h3>Enviados</h3><p id="enviados">0</p></div>
        <div class="card"><h3>Entregados</h3><p id="entregados">0</p></div>
        <div class="card"><h3>No recibidos</h3><p id="noRecibidos">0</p></div>
    </div>
</div>

<!-- REGISTRO -->
<div id="registro" style="display:none;">
    <h1>Registrar Documento</h1>

        <form action="guardar.php" method="POST" id="formRegistro">
        <h2>Registrar Documento</h2>

        <!-- CÓDIGO -->
        <label>Código (Ingrese solo el número)</label>
        <div style="display:flex; gap:5px;">
            <input type="text" value="DOC" readonly style="width:70px;">
            <input type="number" name="numero" placeholder="Ej: 1" min="1" max="999" required>
        </div>

        <!-- TIPO -->
        <label>Tipo de Documento</label>
        <select name="tipo" required>
            <option value="">Seleccione...</option>
            <option value="Oficio">Oficio</option>
            <option value="Carta">Carta</option>
            <option value="Memorando">Memorando</option>
            <option value="Informe">Informe</option>
        </select>

        <!-- FECHA -->
        <label>Fecha de Recepción</label>
       <input type="date" name="fecha" required>
        <label>Remitente (solo letras)</label>
        <input type="text" name="remitente" placeholder="Ej: Juan Perez"
            pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ ]+" 
            title="Solo letras y espacios"
            required>

        <!-- DESPACHO -->
        <label>Despacho</label>
        <select name="despacho" required>
            <option value="">Seleccione...</option>
            <option value="1">Fiscalía 1</option>
            <option value="2">Fiscalía 2</option>
            <option value="3">Administración</option>
            <option value="4">Logística</option>
        </select>

        <button type="submit">Registrar</button>
    </form>
</div>

<!-- LISTA -->
<div id="lista" style="display:none;">
    <h1>Lista de Documentos</h1>

    <form action="generar_guia.php" method="POST">

    <table>
        <thead>
            <tr>
                <th>✔</th>
                <th>Código</th>
                <th>Tipo</th>
                <th>Fecha</th>
                <th>Remitente</th>
                <th>Despacho</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

    <button type="submit">🚚 Generar Guía</button>
    </form>
</div>

</div>

<script src="js/app.js"></script>
</body>
</html>
