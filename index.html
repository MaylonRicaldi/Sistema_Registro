<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Sistema de Documentos</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #1565C0;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 10px;
            text-decoration: none;
            margin-top: 10px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #0d47a1;
        }

        /* Contenido */
        .main {
            flex: 1;
            padding: 20px;
            background: #f4f6f9;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            flex: 1;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
            text-align: center;
        }

        form {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }

        input, select, button {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
        }

        button {
            background: #1565C0;
            color: white;
            border: none;
        }

        table {
            width: 100%;
            margin-top: 20px;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }

        th {
            background: #1565C0;
            color: white;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>📂 Sistema</h2>
    <a href="#">Dashboard</a>
    <a href="#">Registrar Documento</a>
    <a href="#">Guías</a>
</div>

<!-- Contenido -->
<div class="main">

    <h1>Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Documentos</h3>
            <p id="totalDocs">0</p>
        </div>

        <div class="card">
            <h3>Pendientes</h3>
            <p id="pendientes">0</p>
        </div>

        <div class="card">
            <h3>Entregados</h3>
            <p id="entregados">0</p>
        </div>
    </div>

    <!-- Formulario -->
    <form action="guardar.php" method="POST">
        <h2>Registrar Documento</h2>

        <input type="text" name="codigo" placeholder="Código" required>
        <input type="text" name="tipo" placeholder="Tipo" required>
        <input type="date" name="fecha" required>
        <input type="text" name="remitente" placeholder="Remitente" required>

        <select name="despacho">
            <option value="1">Fiscalía 1</option>
            <option value="2">Fiscalía 2</option>
            <option value="3">Administración</option>
            <option value="4">Logística</option>
        </select>

        <button type="submit">Registrar</button>
    </form>

    <!-- Tabla -->
    <h2>Lista de Documentos</h2>

    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Tipo</th>
                <th>Fecha</th>
                <th>Remitente</th>
                <th>Despacho</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>

</div>

<script>
    // Cargar datos desde PHP
    fetch("listar.php")
    .then(res => res.json())
    .then(data => {

        let tabla = document.getElementById("tabla");

        let total = data.length;
        let pendientes = 0;
        let entregados = 0;

        data.forEach(doc => {

            if(doc.estado === "Pendiente de entrega") pendientes++;
            if(doc.estado === "Cargo devuelto entregado") entregados++;

            tabla.innerHTML += `
                <tr>
                    <td>${doc.codigo}</td>
                    <td>${doc.tipo}</td>
                    <td>${doc.fecha_recepcion}</td>
                    <td>${doc.remitente}</td>
                    <td>${doc.despacho}</td>
                    <td>${doc.estado}</td>
                </tr>
            `;
        });

        document.getElementById("totalDocs").innerText = total;
        document.getElementById("pendientes").innerText = pendientes;
        document.getElementById("entregados").innerText = entregados;
    });
</script>

</body>
</html>
